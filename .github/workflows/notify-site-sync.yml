name: Notify Site Sync

on:
  push:
    branches: ["master"]
    paths:
      - "README"
      - "README.*"
      - "assets/**"
      - "logo/**"
      - "logos/**"
      - "static/**"
      - "docs/**/*.svg"
      - "docs/**/*.png"
      - "docs/**/*.jpg"
      - "docs/**/*.jpeg"
      - "docs/**/*.webp"
      - "docs/**/*.gif"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SITE_SYNC_TOKEN: ${{ secrets.NSHKR_SITE_SYNC_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Collect changed paths
        id: changes
        shell: bash
        run: |
          before="${{ github.event.before || '' }}"
          if [[ -z "$before" ]] || [[ "$before" =~ ^0+$ ]]; then
            mapfile -t changed_paths < <(git ls-tree -r --name-only "${{ github.sha }}")
          else
            mapfile -t changed_paths < <(git diff --name-only "$before" "${{ github.sha }}")
          fi

          filtered=()
          for path in "${changed_paths[@]}"; do
            if [[ "$path" =~ ^README($|\.) ]] || \
               [[ "$path" =~ ^assets/ ]] || \
               [[ "$path" =~ ^logo/ ]] || \
               [[ "$path" =~ ^logos/ ]] || \
               [[ "$path" =~ ^static/ ]] || \
               [[ "$path" =~ ^docs/.*\.(svg|png|jpe?g|webp|gif)$ ]]; then
              filtered+=("$path")
            fi
          done

          {
            echo "paths<<EOF"
            printf '%s\n' "${filtered[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch site sync
        if: env.SITE_SYNC_TOKEN != '' && steps.changes.outputs.paths != ''
        uses: actions/github-script@v8
        env:
          CHANGED_PATHS: ${{ steps.changes.outputs.paths }}
        with:
          github-token: ${{ env.SITE_SYNC_TOKEN }}
          script: |
            const changedPaths = (process.env.CHANGED_PATHS || "").split("\n").filter(Boolean);
            await github.rest.repos.createDispatchEvent({
              owner: "nshkrdotcom",
              repo: "nshkrdotcom.github.io",
              event_type: "source-assets-updated",
              client_payload: {
                source_owner: context.repo.owner,
                source_repo: context.repo.repo,
                source_ref: context.ref,
                source_sha: context.sha,
                changed_paths: changedPaths
              }
            });

      - name: Skip direct dispatch
        if: env.SITE_SYNC_TOKEN == '' && steps.changes.outputs.paths != ''
        run: |
          echo "NSHKR_SITE_SYNC_TOKEN is not configured."
          echo "nshkrdotcom.github.io will still detect these README/logo changes on its scheduled source-change scan."

      - name: Log changed paths
        if: steps.changes.outputs.paths != ''
        run: |
          echo "Relevant source changes detected in ${{ github.repository }}@${{ github.sha }}"
          echo '${{ steps.changes.outputs.paths }}'
